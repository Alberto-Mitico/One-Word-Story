<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Word Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --paper: #f5f0e8;
      --cream: #ede6d3;
      --gold: #c8952a;
      --rust: #8b3a1e;
      --muted: #8a7d68;
      --shadow: rgba(26,18,8,0.15);
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 60px;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(200,149,42,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(139,58,30,0.06) 0%, transparent 50%);
    }

    /* ── Navbar ── */
    .navbar {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0 0;
    }

    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-link:hover { color: var(--ink); border-color: var(--ink); }
    .nav-link.active { color: var(--ink); border-color: var(--gold); }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 0 32px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 40px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      text-align: center;
    }

    h1 em { font-style: italic; color: var(--gold); }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 12px;
    }

    /* ── Join panel ── */
    #join-panel {
      width: 100%;
      max-width: 420px;
      background: var(--cream);
      border: 2px solid var(--ink);
      border-radius: 2px;
      padding: 32px;
      margin-bottom: 36px;
      box-shadow: 6px 6px 0 var(--ink);
      animation: slideUp 0.4s ease both;
    }

    #join-panel label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #name {
      width: 100%;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--ink);
      padding: 8px 0;
      outline: none;
      color: var(--ink);
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    #name:focus { border-color: var(--gold); }
    #name::placeholder { color: var(--muted); opacity: 0.6; }

    /* ── Buttons ── */
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 2px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      border-radius: 1px;
    }

    .btn:hover { background: var(--gold); border-color: var(--gold); color: var(--ink); }
    .btn:active { transform: translateY(1px); }

    .btn-ghost { background: transparent; color: var(--ink); }
    .btn-ghost:hover { background: var(--ink); color: var(--paper); }

    .btn-personaggio { background: transparent; color: var(--gold); border-color: var(--gold); }
    .btn-personaggio:hover, .btn-personaggio.active {
      background: var(--gold); border-color: var(--gold); color: var(--ink);
    }

    /* ── Main area ── */
    #main {
      width: 100%;
      max-width: 720px;
      display: none;
      flex-direction: column;
      gap: 28px;
      animation: slideUp 0.4s ease both;
    }

    #main.visible { display: flex; }

    /* ── Players strip ── */
    #players-strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .players-label {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-right: 4px;
    }

    .player-tag {
      font-size: 12px; padding: 4px 12px;
      border: 1.5px solid var(--ink); border-radius: 100px; transition: all 0.2s;
    }

    .player-tag.active { background: var(--ink); color: var(--paper); }
    .player-tag.away { opacity: 0.45; border-style: dashed; }

    /* ── Turn banner ── */
    #turn-banner {
      background: var(--cream); border: 2px solid var(--ink);
      border-left: 6px solid var(--gold); padding: 14px 20px;
      font-size: 13px; letter-spacing: 0.05em;
    }

    #turn-banner strong {
      font-family: 'Playfair Display', serif; font-size: 18px;
      font-style: italic; color: var(--gold);
    }

    /* ── Story display ── */
    #story-container {
      background: #fff; border: 2px solid var(--ink);
      min-height: 180px; padding: 28px 32px;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    #story-title {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }

    #story-title::after { content: ''; flex: 1; height: 1px; background: var(--cream); }

    #story {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 3vw, 24px); line-height: 1.75; color: var(--ink);
    }

    #story .story-line { display: block; animation: fadeWord 0.3s ease both; }
    #story .word-new { color: var(--gold); animation: popWord 0.4s ease both; }

    /* ── Word input ── */
    #word-area { display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap; }

    #word {
      flex: 1;
      font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic;
      background: var(--cream); border: 2px solid var(--ink);
      padding: 14px 18px; outline: none; color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s; border-radius: 1px;
      min-width: 160px;
    }

    #word:focus { border-color: var(--gold); box-shadow: 3px 3px 0 var(--gold); }
    #word::placeholder { color: var(--muted); opacity: 0.5; }
    #word:disabled { opacity: 0.45; cursor: not-allowed; }

    #word-error { font-size: 11px; color: var(--rust); letter-spacing: 0.05em; min-height: 16px; }
    #word-count { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-align: right; }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeWord { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popWord {
      0%   { opacity: 0; transform: scale(0.8); color: var(--gold); }
      60%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); color: var(--gold); }
    }

    /* ── Top buttons ── */
    .top-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: -12px; }

    /* Bottoni piccoli della barra superiore */
    .btn-sm {
      font-size: 11px; padding: 8px 16px;
      background: transparent; letter-spacing: 0.15em;
    }

    .btn-salta {
      color: var(--muted); border-color: var(--muted);
    }
    .btn-salta:hover:not(:disabled) { background: var(--muted); color: var(--paper); border-color: var(--muted); }
    .btn-salta:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-personaggi { color: var(--rust); border-color: var(--rust); }
    .btn-personaggi:hover { background: var(--rust); color: var(--paper); border-color: var(--rust); }

    .btn-chat { color: var(--ink); border-color: var(--ink); position: relative; }
    .btn-chat:hover { background: var(--ink); color: var(--paper); }

    /* Badge messaggi non letti */
    #chat-badge {
      display: none; position: absolute; top: -6px; right: -6px;
      width: 16px; height: 16px; background: var(--rust); color: var(--paper);
      font-size: 9px; border-radius: 50%; align-items: center; justify-content: center;
    }
    #chat-badge.visible { display: flex; }

    /* ── Annulla ── */
    .btn-annulla {
      color: var(--rust); border-color: var(--rust);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, background 0.15s, color 0.15s;
    }
    .btn-annulla.visible { opacity: 1; pointer-events: auto; }
    .btn-annulla:hover { background: var(--rust); color: var(--paper); border-color: var(--rust); }

    /* ── Personaggi panel ── */
    #personaggi-panel {
      background: var(--cream); border: 2px solid var(--ink);
      padding: 20px 24px; box-shadow: 4px 4px 0 var(--ink);
      animation: slideUp 0.25s ease both;
    }

    #personaggi-title {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px;
    }

    #personaggi-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .personaggio-tag {
      font-family: 'Playfair Display', serif; font-size: 13px; font-style: italic;
      padding: 6px 14px; border: 1.5px solid var(--ink); background: #fff;
      cursor: pointer; border-radius: 2px;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }
    .personaggio-tag:hover { background: var(--ink); color: var(--paper); transform: translateY(-1px); }

    /* ── Chat modal ── */
    #chat-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,18,8,0.45); z-index: 100;
      align-items: flex-end; justify-content: center; padding: 20px;
    }
    #chat-overlay.open { display: flex; }

    #chat-modal {
      width: 100%; max-width: 520px; background: var(--paper);
      border: 2px solid var(--ink); box-shadow: 6px 6px 0 var(--ink);
      display: flex; flex-direction: column; max-height: 60vh;
      animation: slideUp 0.25s ease both;
    }

    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 2px solid var(--ink); background: var(--cream);
    }

    #chat-header-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    #chat-close {
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--ink); line-height: 1; padding: 0 4px;
    }
    #chat-close:hover { color: var(--rust); }

    #chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .chat-msg { display: flex; flex-direction: column; gap: 2px; animation: fadeWord 0.25s ease both; }
    .chat-msg-meta { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); }
    .chat-msg-meta .chat-name { color: var(--gold); font-weight: 500; }
    .chat-msg-meta .chat-name.is-me { color: var(--rust); }

    .chat-msg-text {
      font-family: 'Playfair Display', serif; font-size: 15px; line-height: 1.5;
      color: var(--ink); background: var(--cream);
      border-left: 3px solid var(--gold); padding: 8px 12px; border-radius: 0 2px 2px 0;
    }
    .chat-msg.is-me .chat-msg-text { border-left-color: var(--rust); background: #fff; }

    #chat-empty {
      color: var(--muted); font-size: 12px; font-style: italic;
      text-align: center; margin: auto; opacity: 0.7;
    }

    #chat-input-area { display: flex; border-top: 2px solid var(--ink); }

    #chat-input {
      flex: 1; font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic;
      background: var(--cream); border: none; padding: 14px 16px; outline: none;
      color: var(--ink); resize: none; min-height: 52px; max-height: 120px;
    }
    #chat-input::placeholder { color: var(--muted); opacity: 0.6; }

    #chat-send {
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.15em; text-transform: uppercase;
      border: none; border-left: 2px solid var(--ink);
      background: var(--ink); color: var(--paper);
      padding: 0 20px; cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    #chat-send:hover { background: var(--gold); color: var(--ink); }

    /* ── Footer ── */
    footer {
      margin-top: 60px; font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); opacity: 0.6;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-link active">Home</a>
  <a href="antologia.html" class="nav-link">Antologia</a>
</nav>

<header>
  <p class="eyebrow">Un racconto collettivo</p>
  <h1>One <em>Word</em> Story</h1>
  <p class="subtitle">Una parola alla volta · Un'storia insieme</p>
</header>

<!-- Join -->
<div id="join-panel">
  <label for="name">Il tuo nome</label>
  <input id="name" placeholder="scrivi il tuo nome…" autocomplete="off" />
  <button class="btn" onclick="join()">Entra nella storia →</button>
</div>

<!-- Main game -->
<div id="main">

  <div class="top-buttons">
    <button class="btn btn-sm btn-salta" id="btn-salta" onclick="saltaTurno()" disabled>Salta</button>
    <button class="btn btn-sm btn-personaggi" onclick="togglePersonaggiPanel()">Personaggi</button>
    <button class="btn btn-sm btn-chat" onclick="openChat()" id="btn-chat">
      Chat
      <span id="chat-badge"></span>
    </button>
  </div>

  <div id="personaggi-panel" style="display:none;">
    <div id="personaggi-title">Scegli un personaggio</div>
    <div id="personaggi-list"></div>
  </div>

  <div id="players-strip">
    <span class="players-label">Narratori</span>
    <div id="players-list" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
  </div>

  <div id="turn-banner">
    Tocca a: <strong id="turn-name">—</strong>
  </div>

  <div id="story-container">
    <div id="story-title">La storia fin qui</div>
    <div id="story"></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div id="word-error"></div>
    <div id="word-count">0 parole</div>
  </div>

  <div id="word-area">
    <button class="btn btn-sm btn-annulla" id="btn-annulla" onclick="annullaParola()" title="Elimina l'ultima parola che hai scritto">← Annulla</button>
    <button class="btn btn-personaggio" id="btn-personaggio" onclick="togglePersonaggio()">Nuovo personaggio</button>
    <input id="word" placeholder="la tua parola…" autocomplete="off" />
    <button class="btn btn-ghost" onclick="sendWord()">Invia</button>
  </div>

</div>

<footer>One Word Story &mdash; gioco collaborativo</footer>

<!-- Chat modal -->
<div id="chat-overlay" onclick="handleOverlayClick(event)">
  <div id="chat-modal">
    <div id="chat-header">
      <span id="chat-header-title">Chat dei narratori</span>
      <button id="chat-close" onclick="closeChat()">✕</button>
    </div>
    <div id="chat-messages">
      <span id="chat-empty">Nessun messaggio ancora… rompete il ghiaccio!</span>
    </div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="scrivi un messaggio…" rows="1"></textarea>
      <button id="chat-send" onclick="sendChat()">Invia</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myName      = '';
  let currentTurn = '';
  let lastAuthor  = '';
  let allWords    = [];
  let chatOpen    = false;
  let unreadCount = 0;

  // ── Entrata ──
  function join() {
    const nameInput = document.getElementById('name');
    myName = nameInput.value.trim();
    if (!myName) return;
    socket.emit('join', myName);
    document.getElementById('join-panel').style.display = 'none';
    document.getElementById('main').classList.add('visible');
  }

  document.getElementById('name').addEventListener('keydown', e => {
    if (e.key === 'Enter') join();
  });

  socket.on('connect', () => {
    if (myName) socket.emit('join', myName);
  });

  // ── Errore temporaneo ──
  function showError(msg) {
    const el = document.getElementById('word-error');
    el.textContent = msg;
    setTimeout(() => { el.textContent = ''; }, 2000);
  }

  // ── Story ──
  socket.on('story', data => {
    // Supporta sia array (legacy) che oggetto {words, lastAuthor}
    if (Array.isArray(data)) {
      renderStory(data, '');
    } else {
      renderStory(data.words, data.lastAuthor);
    }
  });

  function renderStory(words, author) {
    allWords   = words || [];
    lastAuthor = author || '';
    const count = allWords.length;

    const lines = [];
    for (let i = 0; i < allWords.length; i += 8) lines.push(allWords.slice(i, i + 8));

    let html = '';
    lines.forEach((line, li) => {
      const spans = line.map((w, wi) => {
        const idx = li * 8 + wi;
        return `<span class="${idx === count - 1 ? 'word-new' : ''}">${w}</span>`;
      }).join(' ');
      html += `<span class="story-line">${spans}</span>\n`;
    });

    document.getElementById('story').innerHTML =
      html || '<span style="color:var(--muted);font-style:italic;font-size:16px">La storia non è ancora iniziata…</span>';

    document.getElementById('word-count').textContent =
      count === 0 ? '0 parole' : count === 1 ? '1 parola' : `${count} parole`;

    // Mostra Annulla solo se sono io l'ultimo autore
    const btnAnn = document.getElementById('btn-annulla');
    if (myName && lastAuthor === myName && count > 0) {
      btnAnn.classList.add('visible');
    } else {
      btnAnn.classList.remove('visible');
    }
  }

  // ── Turno ──
  socket.on('turn', name => updateTurnUI(name));

  function updateTurnUI(name) {
    currentTurn = name;
    document.getElementById('turn-name').textContent = name || '—';
    const wordInput = document.getElementById('word');
    const btnSalta  = document.getElementById('btn-salta');
    const isMyTurn  = !!(myName && name === myName);
    wordInput.disabled = !isMyTurn;
    wordInput.placeholder = isMyTurn ? 'la tua parola…' : `aspetta il turno di ${name}…`;
    btnSalta.disabled = !isMyTurn;
    if (isMyTurn) wordInput.focus();
  }

  // ── Giocatori ──
  socket.on('players', players => {
    const list = document.getElementById('players-list');
    list.innerHTML = players.map(p => {
      const name   = typeof p === 'object' ? p.name : p;
      const away   = typeof p === 'object' ? p.disconnected : false;
      const active = name === currentTurn;
      return `<span class="player-tag ${active ? 'active' : ''} ${away ? 'away' : ''}">${name}${away ? ' ↻' : ''}</span>`;
    }).join('');
  });

  // ── Invia parola ──
  let personaggioMode = false;

  function togglePersonaggio() {
    personaggioMode = !personaggioMode;
    const btn       = document.getElementById('btn-personaggio');
    const wordInput = document.getElementById('word');
    if (personaggioMode) {
      btn.classList.add('active');
      wordInput.placeholder = 'scrivi la battuta del personaggio…';
    } else {
      btn.classList.remove('active');
      wordInput.placeholder = 'la tua parola…';
    }
    wordInput.focus();
  }

  function spaceAllowed(current) {
    if (personaggioMode) return true;
    const trimmed = current.trim();
    if (!trimmed) return false;
    if (trimmed.includes(' ')) return false;
    if (/[.!?,;:]$/.test(trimmed)) return true;
    if (/^["«"'']/.test(trimmed)) return true;
    return false;
  }

  function isValidWord(word) {
    if (personaggioMode) return word.trim().length > 0;
    const trimmed = word.trim();
    if (!trimmed) return false;
    const parts = trimmed.split(' ');
    if (parts.length > 2) return false;
    if (parts.length === 2) {
      const startsWithQuote  = /^["«"'']/.test(trimmed);
      const firstEndsPunct   = /[.!?,;:]$/.test(parts[0]);
      if (!startsWithQuote && !firstEndsPunct) return false;
    }
    return true;
  }

  function sendWord() {
    const wordInput = document.getElementById('word');
    const word = wordInput.value.trim();
    if (!word) return;
    if (!isValidWord(word)) {
      showError('⚠ Solo una parola (o punteggiatura + parola)!');
      return;
    }
    socket.emit('word', word);
    wordInput.value = '';
    if (personaggioMode) {
      personaggioMode = false;
      document.getElementById('btn-personaggio').classList.remove('active');
      wordInput.placeholder = 'la tua parola…';
    }
  }

  document.getElementById('word').addEventListener('keydown', e => {
    if (e.key === ' ') {
      if (!spaceAllowed(document.getElementById('word').value)) {
        e.preventDefault();
        showError('⚠ Solo una parola!');
      }
    }
    if (e.key === 'Enter') sendWord();
  });

  // ── Salta ──
  function saltaTurno() {
    if (!myName || currentTurn !== myName) return;
    socket.emit('skip');
  }

  // ── Annulla ultima parola ──
  function annullaParola() {
    if (!myName || lastAuthor !== myName) return;
    socket.emit('undo', myName);
  }

  // ── Personaggi ──
  const PERSONAGGI = [
    "Capocantiere","Dwayne the rock detto Johnson","Tacchino enorme",
    "Anna Bolena","Papa Schlump (Grande)","Gargamella","Anatroccolo","Anatroccola",
    "San Giuseppe di Michael (goat)","Primo Levi","Marco Polo",
    "Stretto sciatore sciamano sciagurato","Abraham Lincoln","Hammurabi",
    "Rosa Parks","Schopenhauer","Gianmarco Zagato","Contadino","Optimus Prime",
    "l'Ape principessa (carinissima)","Tartarughina"
  ];

  function togglePersonaggiPanel() {
    const panel = document.getElementById('personaggi-panel');
    if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
    document.getElementById('personaggi-list').innerHTML =
      PERSONAGGI.map((p, i) => `<span class="personaggio-tag" onclick="selectPersonaggio(${i})">${p}</span>`).join('');
    panel.style.display = 'block';
  }

  function selectPersonaggio(idx) {
    personaggioMode = true;
    document.getElementById('btn-personaggio').classList.add('active');
    const wordInput = document.getElementById('word');
    wordInput.placeholder = 'scrivi la battuta del personaggio…';
    wordInput.value = PERSONAGGI[idx];
    wordInput.focus();
    wordInput.setSelectionRange(wordInput.value.length, wordInput.value.length);
    document.getElementById('personaggi-panel').style.display = 'none';
  }

  // ── Chat ──
  function openChat() {
    chatOpen = true;
    document.getElementById('chat-overlay').classList.add('open');
    unreadCount = 0;
    updateBadge();
    setTimeout(() => {
      document.getElementById('chat-messages').scrollTop = 9999;
      document.getElementById('chat-input').focus();
    }, 50);
  }

  function closeChat() {
    chatOpen = false;
    document.getElementById('chat-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('chat-overlay')) closeChat();
  }

  function updateBadge() {
    const badge = document.getElementById('chat-badge');
    if (unreadCount > 0 && !chatOpen) {
      badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
  }

  function sendChat() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text || !myName) return;
    socket.emit('chat', { name: myName, text });
    input.value = '';
    input.style.height = 'auto';
    input.focus();
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });

  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  socket.on('chat', ({ name, text, time }) => {
    const msgs  = document.getElementById('chat-messages');
    const empty = document.getElementById('chat-empty');
    if (empty) empty.remove();
    const isMe    = name === myName;
    const timeStr = time
      ? new Date(time).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })
      : '';
    const div = document.createElement('div');
    div.className = 'chat-msg' + (isMe ? ' is-me' : '');
    div.innerHTML = `
      <div class="chat-msg-meta">
        <span class="chat-name${isMe ? ' is-me' : ''}">${escapeHtml(name)}</span>
        ${timeStr ? `<span style="margin-left:6px">${timeStr}</span>` : ''}
      </div>
      <div class="chat-msg-text">${escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    if (!chatOpen && !isMe) { unreadCount++; updateBadge(); }
  });

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
